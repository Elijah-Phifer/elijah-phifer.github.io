<head>

    body {
      font-family: 'Arial', sans-serif;

    .header {
      background-color: #343a40;
      color: #ffffff;
      padding: 20px;
      text-align: center;
    }
    .container-custom {
      padding: 40px 20px;
    }
    .card {
      margin: 20px 0;
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Elijah Phifer</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="cv.html">CV</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="research.html">Research</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="projects.html">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="contact.html">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <div class="header">
    <h1>Elijah Phifer</h1>
    <p>PhD Aspirant | Computer Scientist | Researcher</p>
  </div>

  <!-- Latest Updates Section -->
  <div class="container container-custom">
    <h2 class="section-title">Latest Updates</h2>
    <div class="row">
      <!-- Medium Blog Section -->
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Latest Medium Blog</h5>
            <p class="card-text" id="medium-posts">Fetching latest Medium post...</p>
          </div>
        </div>
      </div>
      
      <!-- Podcast Section -->
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Latest Podcast Episode</h5>
            <p class="card-text" id="podcast-episode">Fetching latest podcast episode...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Medium Blog RSS Feed Script -->
  <script>
    async function fetchMediumRSS() {
      const rssUrl = 'https://medium.com/feed/@ephifer21'; // Replace @yourusername with your Medium username
      const proxyUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(rssUrl);

      try {
        const response = await fetch(proxyUrl);
        const data = await response.json();
        if (data.status === 'ok') {
          const latestPost = data.items[0]; // Gets the latest post
          document.getElementById('medium-posts').innerHTML = `
            <strong><a href="${latestPost.link}" target="_blank">${latestPost.title}</a></strong><br>
            ${latestPost.pubDate.split(' ')[0]}<br>
            ${latestPost.description.substring(0, 100)}... <a href="${latestPost.link}" target="_blank">Read more</a>
          `;
        } else {
          document.getElementById('medium-posts').innerText = "Could not fetch Medium posts.";
        }
      } catch (error) {
        console.error('Error fetching Medium RSS:', error);
        document.getElementById('medium-posts').innerText = "Error fetching Medium posts.";
      }
    }

    fetchMediumRSS();
  </script>

  <!-- Podcast RSS Feed Script -->
  <script>
    async function fetchPodcastRSS() {
      const rssUrl = 'https://feeds.simplecast.com/54nAGcIl'; // Replace with your podcast's RSS feed URL
      const proxyUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(rssUrl);

      try {
        const response = await fetch(proxyUrl);
        const data = await response.json();
        if (data.status === 'ok') {
          const latestEpisode = data.items[0]; // Gets the latest episode
          document.getElementById('podcast-episode').innerHTML = `
            <strong><a href="${latestEpisode.link}" target="_blank">${latestEpisode.title}</a></strong><br>
            ${latestEpisode.pubDate.split(' ')[0]}<br>
            ${latestEpisode.description.substring(0, 100)}... <a href="${latestEpisode.link}" target="_blank">Listen now</a>
          `;
        } else {
          document.getElementById('podcast-episode').innerText = "Could not fetch podcast episode.";
        }
      } catch (error) {
        console.error('Error fetching podcast RSS:', error);
        document.getElementById('podcast-episode').innerText = "Error fetching podcast episode.";
      }
    }

    fetchPodcastRSS();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
